<!-- @dsCard group="Type" viewport="700x180" name="Fira Sans family" subtitle="The single brand typeface — Bold headlines, Medium body" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .big { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: 60px; line-height: 1; color: var(--text-strong); letter-spacing: -0.02em; }
  .sub { font-family: var(--font-sans); font-weight: var(--fw-medium); color: var(--text-body); margin-top: 12px; font-size: 16px; }
  .alpha { font-family: var(--font-sans); font-weight: var(--fw-medium); color: var(--text-muted); font-size: 18px; margin-top: 10px; letter-spacing: 0.01em; }
  b { color: var(--reh-red); }
</style>
</head>
<body>
  <div class="big">Fira Sans</div>
  <div class="sub"><b>Bold</b> für Überschriften · <b>Medium</b> für Bodytexte · Humanist, freundlich, gut lesbar</div>
  <div class="alpha">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 1234567890 ÄÖÜ €</div>
</body>
</html>
