<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Headline & body sizes in use" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); color: var(--text-strong); }
  .line { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); width: 96px; flex: none; }
  .s1 { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: var(--fs-4xl); line-height: 1.05; letter-spacing: -0.02em; }
  .s2 { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: var(--fs-2xl); }
  .s3 { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: var(--fs-xl); }
  .s4 { font-family: var(--font-sans); font-weight: var(--fw-medium); font-size: var(--fs-md); color: var(--text-body); }
  .s5 { font-family: var(--font-sans); font-weight: var(--fw-bold); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: var(--ls-caps); color: var(--text-brand); }
</style>
</head>
<body>
  <div class="line"><span class="tag">4xl / 64</span><span class="s1">Wohnträume</span></div>
  <div class="line"><span class="tag">2xl / 36</span><span class="s2">Ihre neue Traumküche</span></div>
  <div class="line"><span class="tag">xl / 28</span><span class="s3">Eckkombination Vienna</span></div>
  <div class="line"><span class="tag">md / 18 body</span><span class="s4">Persönliche Beratung und bewährte Qualität.</span></div>
  <div class="line"><span class="tag">xs / 14 caps</span><span class="s5">Marken Aktions-Tage</span></div>
</body>
</html>
