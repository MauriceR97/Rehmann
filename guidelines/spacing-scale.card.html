<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4px base — space-1 … space-9" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); display: flex; align-items: flex-end; gap: 16px; }
  .col { text-align: center; }
  .bar { background: var(--reh-red); border-radius: var(--radius-xs); width: 30px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="col"><div class="bar" style="height:var(--space-1)"></div><div class="lab">1·4</div></div>
  <div class="col"><div class="bar" style="height:var(--space-2)"></div><div class="lab">2·8</div></div>
  <div class="col"><div class="bar" style="height:var(--space-3)"></div><div class="lab">3·12</div></div>
  <div class="col"><div class="bar" style="height:var(--space-4)"></div><div class="lab">4·16</div></div>
  <div class="col"><div class="bar" style="height:var(--space-5)"></div><div class="lab">5·24</div></div>
  <div class="col"><div class="bar" style="height:var(--space-6)"></div><div class="lab">6·32</div></div>
  <div class="col"><div class="bar" style="height:var(--space-7)"></div><div class="lab">7·48</div></div>
  <div class="col"><div class="bar" style="height:var(--space-8)"></div><div class="lab">8·64</div></div>
</body>
</html>
