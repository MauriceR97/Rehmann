<!-- @dsCard group="Type" viewport="700x150" name="Price & promo lockup" subtitle="How prices and offer flashes are set" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); display: flex; gap: 36px; align-items: center; }
  .block .k { font-family: var(--font-sans); font-weight: var(--fw-medium); font-size: 14px; color: var(--text-muted); }
  .price { font-family: var(--font-display); font-weight: var(--fw-extra); font-size: 56px; line-height: 1; color: var(--text-price); font-feature-settings: "tnum" 1; }
  .flash { background: var(--reh-red); color: #fff; font-family: var(--font-display); font-weight: var(--fw-extra); border-radius: var(--radius-md); padding: 14px 18px; text-align: center; }
  .flash .pct { font-size: 38px; line-height: 1; }
  .flash .lab { font-size: 12px; font-weight: var(--fw-bold); text-transform: uppercase; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="block">
    <div class="k">Voll-Service-Preis · Sie zahlen nur</div>
    <div class="price">2.499,&ndash;</div>
  </div>
  <div class="flash">
    <div class="lab">Marken-Rabatt</div>
    <div class="pct">30%</div>
    <div class="lab">auf Wohnmöbel</div>
  </div>
</body>
</html>
