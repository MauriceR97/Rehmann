<!-- @dsCard group="Colors" viewport="700x130" name="Warm neutrals" subtitle="Page, surfaces, borders, body text" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--surface-page); }
  .row { display: flex; gap: 6px; }
  .col { flex: 1; }
  .chip { height: 56px; border-radius: var(--radius-sm); border: 1px solid var(--border-subtle); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 5px; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="chip" style="background:var(--neutral-50)"></div><div class="lab">50</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-100)"></div><div class="lab">100</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-150)"></div><div class="lab">150</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-200)"></div><div class="lab">200</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-300)"></div><div class="lab">300</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-400)"></div><div class="lab">400</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-500)"></div><div class="lab">500</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-600)"></div><div class="lab">600</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-700)"></div><div class="lab">700</div></div>
    <div class="col"><div class="chip" style="background:var(--neutral-900)"></div><div class="lab">900</div></div>
  </div>
</body>
</html>
