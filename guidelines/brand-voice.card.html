<!-- @dsCard group="Brand" viewport="700x150" name="Voice & tagline" subtitle="Tagline du · marketing Sie · no emoji" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); }
  .tagline { font-family: var(--font-display); font-weight: var(--fw-bold); font-size: 30px; color: var(--text-strong); letter-spacing: -0.01em; }
  .tagline b { color: var(--reh-red); }
  .rule { margin: 14px 0; border: 0; border-top: 1px solid var(--border-subtle); }
  .row { display: flex; gap: 28px; font-family: var(--font-sans); font-size: 14px; }
  .row div { color: var(--text-body); }
  .k { font-weight: var(--fw-bold); color: var(--text-strong); display: block; margin-bottom: 2px; }
  em { color: var(--text-brand); font-style: normal; font-weight: var(--fw-bold); }
</style>
</head>
<body>
  <div class="tagline">Möbel für <b>dich</b> gemacht.</div>
  <hr class="rule">
  <div class="row">
    <div><span class="k">Anrede</span>Tagline = <em>du</em> · Marketing = <em>Sie</em></div>
    <div><span class="k">Ton</span>warm · einladend · hochwertig · regional</div>
    <div><span class="k">Tabu</span>keine Emoji · kein Discount-Ton</div>
  </div>
</body>
</html>
