<!-- @dsCard group="Spacing" viewport="700x160" name="Elevation / shadows" subtitle="Soft, warm-tinted — showroom light" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 20px; background: var(--surface-page); display: flex; gap: 24px; align-items: center; justify-content: space-around; }
  .col { text-align: center; }
  .box { width: 96px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="lab">brand</div></div>
</body>
</html>
